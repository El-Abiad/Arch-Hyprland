general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = ~/dotfiles/hypr/.config/hypr/wallpapers/arch-3.jpg
    color = rgba(11, 11, 11, 1.0)
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.20
    dots_spacing = 0.30
    dots_center = true
    outer_color = rgb(0f0f0f)
    inner_color = rgb(000000)
    font_color = rgb(FFFFFF)
    fade_on_empty = false
    placeholder_text = <span foreground="##F2F2F2">Yeah...?</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
