##########
## VARS ##
##########
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun
$browser = firefox


###########
## INPUT ##
###########

input {
    kb_layout = us, ara, es
    kb_options = grp:alt_shift_toggle

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

##############
## MONITORS ##
##############
monitor=,preferred,auto, 1


###############
## AUTOSTART ##
###############
exec-once = waybar & hyprpaper & hyprsunset --temperature 2500

###########################
## ENVIRONMENT VARIABLES ##
###########################
env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = GTK_THEME,Material-Black-Cherry-3.38
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprlands


##########
## LOOK ##
##########
general {
	gaps_in = 10
	gaps_out = 10
	border_size = 0
}


decoration {
	active_opacity = 0.9
	inactive_opacity = 0.85

	rounding = 10
	rounding_power = 10

	shadow{
		enabled = true
		range = 5
		render_power = 2
		color = rgba(AAAAAAAA)
	}
}



####################
### KEYBINDINGS  ###
####################
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, C, exec, code
bind = $mainMod, P, exec, poweroff
bind = $mainMod, B, exec, $browser
bind = $mainMod, T, exec, Telegram
bind = $mainMod, I, exec, intellij-idea-ultimate-edition

bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, A, exec, ~/dotfiles/scripts/./cp.zsh 

bind = , XF86SelectiveScreenshot, exec, hyprshot -m region -o ~/Screenshots
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

################
## WORKSPACES ##
################
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
